isli_version: '2.0'
id: autocar-api
name: AutoCar API Connector
description: Connects to the AutoCar Software API with explicit tools for each entity.
version: 2.0.0
author: AI Agent
category: workspace
runtime:
  port: 8000
  build:
    context: .
    dockerfile: Dockerfile
auth:
  type: internal_jwt
tools:
- name: login
  description: Authenticate with your staff account. Tokens are stored internally.
  endpoint: login
  method: POST
  parameters:
    type: object
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
- name: list_customers
  description: Fetch all records from customers.
  endpoint: list_customers
  method: POST
  parameters:
    type: object
    properties: {}
- name: get_customer
  description: Get a specific customer by its unique ID (GUID).
  endpoint: get_customer
  method: POST
  parameters:
    type: object
    properties:
      id:
        type: string
    required:
    - id
- name: create_customer
  description: Create a new customer record.
  endpoint: create_customer
  method: POST
  parameters:
    type: object
    properties:
      data:
        type: object
    required:
    - data
- name: update_customer
  description: Modify an existing customer record by ID.
  endpoint: update_customer
  method: POST
  parameters:
    type: object
    properties:
      id:
        type: string
      data:
        type: object
    required:
    - id
    - data
- name: delete_customer
  description: Permanently remove a customer by ID.
  endpoint: delete_customer
  method: POST
  parameters:
    type: object
    properties:
      id:
        type: string
    required:
    - id
