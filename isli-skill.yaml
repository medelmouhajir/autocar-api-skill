isli_version: '2.0'
id: autocar-api
name: AutoCar API Connector
description: Connects to the AutoCar Software API with explicit, stateless tools (Optimized
  for local architecture).
version: 3.0.0
author: AI Agent
category: workspace
runtime:
  port: 8101
  build:
    context: .
    dockerfile: Dockerfile
tools:
- name: login
  description: Authenticate with your staff account. Returns an accessToken that MUST
    be passed in the payload of all other tools.
  endpoint: login
  method: POST
  parameters:
    type: object
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
- name: list_customers
  description: Fetch all records from customers. Requires 'access_token'.
  endpoint: list_customers
  method: POST
  parameters:
    type: object
    properties:
      access_token:
        type: string
    required:
    - access_token
- name: get_customer
  description: Get a specific customer by its unique ID. Requires 'access_token' and
    'id'.
  endpoint: get_customer
  method: POST
  parameters:
    type: object
    properties:
      id:
        type: string
      access_token:
        type: string
    required:
    - id
    - access_token
- name: create_customer
  description: Create a new customer. Requires 'access_token' and a 'data' object.
  endpoint: create_customer
  method: POST
  parameters:
    type: object
    properties:
      data:
        type: object
      access_token:
        type: string
    required:
    - data
    - access_token
- name: update_customer
  description: Modify an existing customer. Requires 'access_token', 'id', and 'data'
    object.
  endpoint: update_customer
  method: POST
  parameters:
    type: object
    properties:
      id:
        type: string
      data:
        type: object
      access_token:
        type: string
    required:
    - id
    - data
    - access_token
- name: delete_customer
  description: Permanently remove a customer by ID. Requires 'access_token'.
  endpoint: delete_customer
  method: POST
  parameters:
    type: object
    properties:
      id:
        type: string
      access_token:
        type: string
    required:
    - id
    - access_token
- name: list_invoices
  description: Fetch all records from invoices. Requires 'access_token'.
